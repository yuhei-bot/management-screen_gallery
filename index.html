<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in'dex hair 管理システム - Gallery</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f8f9fa;
            --accent-color: #2c3e50;
            --salon-accent: #d89689;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--primary-color);
        }

        /* --- ヘッダー --- */
        header {
            width: 100%; background: white; padding: 20px 0 10px 0;
            text-align: center; border-bottom: 1px solid #e0e0e0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 15px; }
        #live-clock { background: #fff; border: 1px solid #ddd; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .nav-menu { display: flex; justify-content: center; gap: 15px; padding-bottom: 10px; }
        .nav-item {
            display: flex; align-items: center; gap: 8px; padding: 10px 20px;
            background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 0.95rem; color: #555;
        }
        .nav-item.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* --- 操作エリア --- */
        .action-bar {
            width: 95%; max-width: 1200px; margin: 30px auto 10px;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .search-input {
            flex: 1; max-width: 400px; padding: 12px 20px; border-radius: 25px;
            border: 1px solid #ddd; outline: none; background: white; font-size: 1rem;
        }
        .btn-add {
            background: var(--accent-color); color: white; border: none;
            padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* --- ギャラリー表示 (1列4枚固定) --- */
        .gallery-grid {
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* 1列4枚 */
            gap: 20px;
            width: 95%; max-width: 1200px; margin: 20px auto 30px;
        }
        @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .style-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); position: relative; transition: 0.3s;
        }
        .style-card img { width: 100%; height: 260px; object-fit: cover; background: #eee; }
        .card-info { padding: 12px; }
        .style-name { font-weight: bold; font-size: 15px; }
        .style-comment { font-size: 12px; color: #777; margin: 6px 0; line-height: 1.4; height: 34px; overflow: hidden; }
        .style-tags { font-size: 11px; color: var(--salon-accent); font-weight: bold; }

        /* --- ホバー管理ボタン --- */
        .admin-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 260px;
            background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center;
            gap: 15px; opacity: 0; transition: 0.3s;
        }
        .style-card:hover .admin-overlay { opacity: 1; }
        .admin-btn {
            background: white; border: none; width: 50px; height: 50px;
            border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.2s;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-edit:hover { background: var(--accent-color); color: white; transform: scale(1.1); }
        .btn-delete { color: var(--danger-color); }
        .btn-delete:hover { background: var(--danger-color); color: white; transform: scale(1.1); }

        /* --- 編集モーダル --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto;
        }
        .modal-content h3 { margin-top: 0; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        
        /* プレビュー画像エリア */
        .preview-area {
            width: 100%; height: 150px; border: 2px dashed #ddd; border-radius: 8px;
            margin-bottom: 15px; display: flex; justify-content: center; align-items: center;
            overflow: hidden; background: #f9f9f9;
        }
        .preview-area img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-save { background: var(--accent-color); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #eee; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; }

        /* ページネーション */
        .pagination { display: flex; justify-content: center; gap: 8px; margin: 30px 0 50px; }
        .page-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .page-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>in'dex hair 管理システム</h1>
        <div id="live-clock">Loading...</div>
    </div>
    <nav class="nav-menu">
        <div class="nav-item">📅 カレンダー</div>
        <div class="nav-item">⌛ タイムライン</div>
        <div class="nav-item active">🖼 ギャラリー編集</div>
        <div class="nav-item">💰 売上管理</div>
        <div class="nav-item disabled">📦 在庫管理</div>
    </nav>
</header>

<div class="action-bar">
    <input type="text" class="search-input" id="search-input" placeholder="スタイルやタグで検索..." oninput="handleSearch()">
    <button class="btn-add" onclick="addNewStyle()">＋ 新規スタイル追加</button>
</div>

<div class="gallery-grid" id="gallery-grid"></div>
<div class="pagination" id="pagination"></div>

<!-- 編集・追加用モーダル -->
<div id="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title">スタイル情報の編集</h3>
        
        <!-- プレビュー表示 -->
        <div class="preview-area" id="image-preview-container">
            <span id="preview-placeholder" style="color: #999;">画像プレビュー</span>
            <img id="image-preview" src="" style="display: none;">
        </div>

        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>画像URL</label>
            <input type="text" id="edit-url" placeholder="https://..." oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>スタイル名</label>
            <input type="text" id="edit-name">
        </div>
        <div class="form-group">
            <label>詳細コメント</label>
            <textarea id="edit-comment" rows="3" placeholder="スタイルの特徴を入力"></textarea>
        </div>
        <div class="form-group">
            <label>タグ</label>
            <input type="text" id="edit-tags" placeholder="#ショート #ボブ">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
            <button class="btn-save" onclick="saveEdit()">反映させる</button>
        </div>
    </div>
</div>

<script>
    // 初期データ
    let galleryData = JSON.parse(localStorage.getItem('indexHair_Gallery_V7')) || [
        { id: 1, name: "フェミニンボブ", comment: "耳掛けでスッキリ見せる大人可愛いスタイル。小顔効果があります。", tags: "#ボブ #似合わせ", url: "https://picsum.photos/seed/1/500/700" },
        { id: 2, name: "艶髪ロング", comment: "髪質改善カラーで圧倒的なツヤを実現。手触りも抜群です。", tags: "#ロング #艶髪", url: "https://picsum.photos/seed/2/500/700" }
    ];

    let searchQuery = "";
    let currentPage = 1;
    const itemsPerPage = 12; // 1ページ12枚

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = "";
        
        const filtered = galleryData.filter(item => 
            item.name.includes(searchQuery) || item.tags.includes(searchQuery) || (item.comment && item.comment.includes(searchQuery))
        );

        // ページネーション計算
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pageItems = filtered.slice(startIndex, startIndex + itemsPerPage);

        pageItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.innerHTML = `
                <img src="${item.url}" alt="${item.name}">
                <div class="card-info">
                    <div class="style-name">${item.name}</div>
                    <div class="style-comment">${item.comment || "コメントなし"}</div>
                    <div class="style-tags">${item.tags}</div>
                </div>
                <div class="admin-overlay">
                    <button class="admin-btn btn-edit" title="編集" onclick="openModal(${item.id})">✎</button>
                    <button class="admin-btn btn-delete" title="削除" onclick="deleteStyle(${item.id})">🗑</button>
                </div>
            `;
            grid.appendChild(card);
        });
        renderPagination(filtered.length);
    }

    // プレビューのリアルタイム更新
    function updatePreview() {
        const url = document.getElementById('edit-url').value;
        const previewImg = document.getElementById('image-preview');
        const placeholder = document.getElementById('preview-placeholder');
        
        if (url) {
            previewImg.src = url;
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            previewImg.style.display = 'none';
            placeholder.style.display = 'block';
        }
    }

    // 編集モーダルを開く
    function openModal(id) {
        const item = galleryData.find(d => d.id === id);
        document.getElementById('modal-title').innerText = "スタイル情報の編集";
        document.getElementById('edit-id').value = item.id;
        document.getElementById('edit-name').value = item.name;
        document.getElementById('edit-url').value = item.url;
        document.getElementById('edit-comment').value = item.comment || "";
        document.getElementById('edit-tags').value = item.tags;
        document.getElementById('modal-overlay').style.display = 'flex';
        updatePreview();
    }

    // 新規追加
    function addNewStyle() {
        document.getElementById('modal-title').innerText = "新規スタイルの追加";
        document.getElementById('edit-id').value = "new";
        document.getElementById('edit-name').value = "";
        document.getElementById('edit-url').value = "";
        document.getElementById('edit-comment').value = "";
        document.getElementById('edit-tags').value = "";
        document.getElementById('modal-overlay').style.display = 'flex';
        updatePreview();
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function saveEdit() {
        const idVal = document.getElementById('edit-id').value;
        const name = document.getElementById('edit-name').value;
        const url = document.getElementById('edit-url').value;
        const comment = document.getElementById('edit-comment').value;
        const tags = document.getElementById('edit-tags').value;

        if (!name || !url) {
            alert("スタイル名と画像URLを入力してください");
            return;
        }

        if (idVal === "new") {
            const newItem = { id: Date.now(), name, url, comment, tags };
            galleryData.unshift(newItem);
        } else {
            const item = galleryData.find(d => d.id === parseInt(idVal));
            item.name = name;
            item.url = url;
            item.comment = comment;
            item.tags = tags;
        }

        localStorage.setItem('indexHair_Gallery_V7', JSON.stringify(galleryData));
        closeModal();
        renderGallery();
    }

    function deleteStyle(id) {
        if(!confirm("削除しますか？")) return;
        galleryData = galleryData.filter(d => d.id !== id);
        localStorage.setItem('indexHair_Gallery_V7', JSON.stringify(galleryData));
        renderGallery();
    }

    function handleSearch() {
        searchQuery = document.getElementById('search-input').value;
        currentPage = 1;
        renderGallery();
    }

    function renderPagination(totalCount) {
        const container = document.getElementById('pagination');
        container.innerHTML = "";
        const totalPages = Math.ceil(totalCount / itemsPerPage);
        if(totalPages <= 1) return;

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.onclick = () => { currentPage = i; renderGallery(); window.scrollTo(0,0); };
            container.appendChild(btn);
        }
    }

    function updateClock() {
        const now = new Date();
        const days = ['日','月','火','水','木','金','土'];
        const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]}) ${now.toLocaleTimeString('ja-JP', {hour12:false})}`;
        document.getElementById('live-clock').innerText = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    renderGallery();
</script>
</body>
</html>
