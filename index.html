<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in'dex hair 管理システム - Gallery</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f8f9fa;
            --accent-color: #2c3e50; /* ギャラリー編集・編集ボタン用：濃紺 */
            --salon-accent: #d89689;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --danger-color: #e74c3c; /* 削除ボタン用：赤 */
            --nav-bg: #fff;
            --nav-border: #e0e0e0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary-color);
        }

        /* --- ヘッダー --- */
        header {
            width: 100%; background: white; padding: 20px 0 10px 0;
            text-align: center; border-bottom: 1px solid var(--nav-border);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-top {
            display: flex; justify-content: center; align-items: center;
            gap: 40px; max-width: 1200px; margin: 0 auto 15px; position: relative;
        }
        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; letter-spacing: 1px; }
        
        #live-clock {
            background: #fff; border: 1px solid #ddd; padding: 5px 15px;
            border-radius: 20px; font-weight: bold; color: #555; font-size: 0.9rem;
        }

        /* --- ナビゲーション（画像のデザインを再現） --- */
        .nav-menu {
            display: flex; justify-content: center; gap: 15px; padding: 10px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: #fff; border: 1px solid var(--nav-border);
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.95rem;
            color: #555; transition: 0.2s;
        }
        .nav-item:hover { background: #f0f0f0; }
        
        /* ギャラリー編集（アクティブ状態） */
        .nav-item.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        
        /* 売上・在庫（無効状態） */
        .nav-item.disabled {
            opacity: 0.5; cursor: not-allowed; background: #fafafa; color: #999;
        }

        /* --- 操作エリア --- */
        .action-bar {
            width: 95%; max-width: 1200px; margin: 30px auto 10px;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .search-input {
            flex: 1; max-width: 400px; padding: 12px 20px; border-radius: 25px;
            border: 1px solid #ddd; outline: none; background: white;
        }
        .btn-add {
            background: var(--accent-color); color: white; border: none;
            padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* --- ギャラリー --- */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 20px; width: 95%; max-width: 1200px; margin: 20px auto 30px;
        }
        @media (max-width: 1000px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .style-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); position: relative; transition: 0.3s;
        }
        .style-card img { width: 100%; height: 260px; object-fit: cover; display: block; }
        .card-info { padding: 12px; }
        .style-name { font-weight: bold; font-size: 14px; }
        .style-tags { font-size: 11px; color: var(--salon-accent); margin-top: 4px; }

        /* --- 管理ボタンのホバーエフェクト --- */
        .admin-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 260px;
            background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;
            gap: 15px; opacity: 0; transition: 0.3s;
        }
        .style-card:hover .admin-overlay { opacity: 1; }

        .admin-btn {
            background: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; font-size: 18px;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-edit:hover { background-color: var(--accent-color); color: white; transform: scale(1.1); }
        .btn-delete { color: var(--danger-color); }
        .btn-delete:hover { background-color: var(--danger-color); color: white !important; transform: scale(1.1); }

        /* --- ページネーション --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 50px; }
        .page-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        #toast {
            visibility: hidden; min-width: 200px; background: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 16px; position: fixed;
            left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 2000;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>in'dex hair 管理システム</h1>
        <div id="live-clock">2026/5/5(火) 11:12:11</div>
    </div>
    <nav class="nav-menu">
        <div class="nav-item">📅 カレンダー</div>
        <div class="nav-item">⌛ タイムライン</div>
        <div class="nav-item active">🖼 ギャラリー編集</div>
        <div class="nav-item disabled">💰 売上管理</div>
        <div class="nav-item disabled">📦 在庫管理</div>
    </nav>
</header>

<div class="action-bar">
    <input type="text" class="search-input" id="search-input" placeholder="スタイルやタグで検索..." oninput="handleSearch()">
    <button class="btn-add" onclick="addNewStyle()">＋ 新規スタイル追加</button>
</div>

<div class="gallery-grid" id="gallery-grid"></div>
<div class="pagination" id="pagination"></div>
<div id="toast"></div>

<script>
    // 初期データ
    const generateInitialData = () => {
        const styles = ["ショート", "大人ボブ", "レイヤーミディ", "ロングウェーブ", "艶髪ストレート"];
        return Array.from({ length: 30 }, (_, i) => ({
            id: Date.now() + i,
            name: styles[i % styles.length] + (i + 1),
            tags: "#カット #カラー",
            url: `https://picsum.photos/seed/${i + 500}/500/700`
        }));
    };

    let galleryData = JSON.parse(localStorage.getItem('indexHair_Gallery_Final')) || generateInitialData();
    let searchQuery = "";
    let currentPage = 1;
    const itemsPerPage = 12;

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = "";

        const filtered = galleryData.filter(item => 
            item.name.includes(searchQuery) || item.tags.includes(searchQuery)
        );

        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pageItems = filtered.slice(startIndex, startIndex + itemsPerPage);

        pageItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.innerHTML = `
                <img src="${item.url}" loading="lazy">
                <div class="card-info">
                    <div class="style-name">${item.name}</div>
                    <div class="style-tags">${item.tags}</div>
                </div>
                <div class="admin-overlay">
                    <button class="admin-btn btn-edit" title="編集" onclick="editStyle(${item.id}, event)">✎</button>
                    <button class="admin-btn btn-delete" title="削除" onclick="deleteStyle(${item.id}, event)">🗑</button>
                </div>
            `;
            grid.appendChild(card);
        });

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        container.innerHTML = "";
        if (totalPages <= 1) return;

        const prev = document.createElement('button');
        prev.innerText = "前へ";
        prev.className = "page-btn";
        prev.disabled = currentPage === 1;
        prev.onclick = () => { currentPage--; renderGallery(); window.scrollTo(0,0); };
        container.appendChild(prev);

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.onclick = () => { currentPage = i; renderGallery(); window.scrollTo(0,0); };
            container.appendChild(btn);
        }

        const next = document.createElement('button');
        next.innerText = "次へ";
        next.className = "page-btn";
        next.disabled = currentPage === totalPages;
        next.onclick = () => { currentPage++; renderGallery(); window.scrollTo(0,0); };
        container.appendChild(next);
    }

    function handleSearch() {
        searchQuery = document.getElementById('search-input').value;
        currentPage = 1;
        renderGallery();
    }

    function editStyle(id, e) {
        e.stopPropagation();
        const item = galleryData.find(d => d.id === id);
        const newName = prompt("スタイル名を変更", item.name);
        if (newName) {
            item.name = newName;
            saveData("スタイルを更新しました");
        }
    }

    function deleteStyle(id, e) {
        e.stopPropagation();
        if(!confirm("このスタイルを削除してもよろしいですか？")) return;
        galleryData = galleryData.filter(d => d.id !== id);
        saveData("削除しました");
    }

    function addNewStyle() {
        const name = prompt("追加するスタイルの名前");
        if (!name) return;
        galleryData.unshift({
            id: Date.now(),
            name: name,
            tags: "#新規追加",
            url: `https://picsum.photos/seed/${Date.now()}/500/700`
        });
        saveData("新規スタイルを追加しました");
    }

    function saveData(msg) {
        localStorage.setItem('indexHair_Gallery_Final', JSON.stringify(galleryData));
        showToast(msg);
        renderGallery();
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.className = "show";
        setTimeout(() => t.className = "", 3000);
    }

    // 時計の更新
    function updateClock() {
        const now = new Date();
        const days = ['日','月','火','水','木','金','土'];
        const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}(${days[now.getDay()]}) ${now.toLocaleTimeString('ja-JP', {hour12:false})}`;
        document.getElementById('live-clock').innerText = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    renderGallery();
</script>
</body>
</html>
