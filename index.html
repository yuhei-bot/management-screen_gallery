<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in'dex hair 管理システム - Gallery</title>
    <!-- SortableJSの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f8f9fa;
            --accent-color: #2c3e50;
            --salon-accent: #d89689;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --danger-color: #e74c3c;
            --edit-color: #3498db;
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--primary-color);
        }

        header {
            width: 100%; background: white; padding: 20px 0 10px 0;
            text-align: center; border-bottom: 1px solid #e0e0e0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-top { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 15px; }
        #live-clock { background: #fff; border: 1px solid #ddd; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        
        .nav-menu { display: flex; justify-content: center; gap: 15px; padding-bottom: 10px; }
        .nav-item {
            display: flex; align-items: center; gap: 8px; padding: 10px 20px;
            background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 0.95rem; color: #555;
        }
        .nav-item.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .action-bar {
            width: 95%; max-width: 1200px; margin: 30px auto 10px;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .search-input {
            flex: 1; max-width: 400px; padding: 12px 20px; border-radius: 25px;
            border: 1px solid #ddd; outline: none; background: white; font-size: 1rem;
        }
        .btn-add {
            background: var(--accent-color); color: white; border: none;
            padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.9; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
            width: 95%; max-width: 1200px; margin: 20px auto 30px;
        }
        @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .style-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow); position: relative; transition: 0.3s;
            cursor: grab;
        }
        .style-card:active { cursor: grabbing; }
        .style-card img { width: 100%; height: 260px; object-fit: cover; background: #eee; pointer-events: none; }
        .card-info { padding: 12px; }
        .style-name { font-weight: bold; font-size: 15px; }
        .style-comment { font-size: 12px; color: #777; margin: 6px 0; line-height: 1.4; height: 34px; overflow: hidden; }
        .style-tags { font-size: 11px; color: var(--salon-accent); font-weight: bold; }

        /* 管理ボタンオーバーレイ */
        .admin-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 260px;
            background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center;
            gap: 15px; opacity: 0; transition: 0.3s;
        }
        .style-card:hover .admin-overlay { opacity: 1; }

        /* 管理ボタン共通スタイル */
        .admin-btn {
            background: white; border: none; width: 50px; height: 50px;
            border-radius: 50%; cursor: pointer; font-size: 20px; 
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            color: #333;
        }

        /* 編集ボタン(✎)のホバー */
        .btn-edit:hover {
            background: var(--edit-color);
            color: white;
            transform: scale(1.1);
        }

        /* 削除ボタン(🗑)のホバー */
        .btn-delete:hover {
            background: var(--danger-color);
            color: white;
            transform: scale(1.1);
        }

        /* ボタンクリック時の挙動 */
        .admin-btn:active {
            transform: scale(0.95);
        }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px;
            max-height: 90vh; overflow-y: auto;
        }
        
        .preview-area {
            width: 100%; height: 180px; border: 2px dashed #ccc; border-radius: 8px;
            margin-bottom: 15px; display: flex; justify-content: center; align-items: center; 
            overflow: hidden; background: #fafafa; transition: 0.2s;
            flex-direction: column; color: #999; text-align: center;
        }
        .preview-area.dragover { border-color: var(--accent-color); background: #ebeef0; color: var(--accent-color); }
        .preview-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .preview-placeholder p { margin: 5px 0; font-size: 12px; }
        .btn-select-file {
            background: #eee; border: 1px solid #ddd; padding: 5px 12px; 
            border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 5px;
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-save { background: var(--accent-color); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #eee; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin: 30px 0 50px; }
        .page-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .page-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>in'dex hair 管理システム</h1>
        <div id="live-clock">Loading...</div>
    </div>
    <nav class="nav-menu">
     <a href="https://yuhei-bot.github.io/-management-screen_calendar/" class="nav-item"><span>📅 カレンダー</span></a>
        <a href="https://yuhei-bot.github.io/timeline/" class="nav-item"><span>⏳ タイムライン</span></a>
        <a href="https://yuhei-bot.github.io/management-screen_gallery/" class="nav-item"><span>🖼️ ギャラリー編集</span></a>
        <a href="https://yuhei-bot.github.io/-management-screen_-sales/#" class="nav-item active"><span>💰 売上管理</span></a>
        <a href="https://yuhei-bot.github.io/management-screen_stock/#" class="nav-item active"><span>📦在庫一覧</span></a>
</header>

<div class="action-bar">
    <input type="text" class="search-input" id="search-input" placeholder="検索..." oninput="handleSearch()">
    <button class="btn-add" onclick="addNewStyle()">＋ 新規スタイル追加</button>
</div>

<div class="gallery-grid" id="gallery-grid"></div>
<div class="pagination" id="pagination"></div>

<!-- モーダル -->
<div id="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title">スタイル編集</h3>
        
        <div class="preview-area" id="drop-area">
            <img id="image-preview" src="" style="display:none;">
            <div id="preview-placeholder" class="preview-placeholder">
                <p>画像をここにドラッグ＆ドロップ</p>
                <p>または</p>
                <button type="button" class="btn-select-file" onclick="document.getElementById('file-input').click()">PCからファイルを選択</button>
            </div>
            <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>画像URL / データパス</label>
            <input type="text" id="edit-url" oninput="updatePreview()" placeholder="https://... またはファイル選択で自動入力">
        </div>
        <div class="form-group"><label>スタイル名</label><input type="text" id="edit-name"></div>
        <div class="form-group"><label>詳細コメント</label><textarea id="edit-comment" rows="3"></textarea></div>
        <div class="form-group"><label>タグ</label><input type="text" id="edit-tags"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
            <button class="btn-save" onclick="saveEdit()">反映させる</button>
        </div>
    </div>
</div>

<script>
    let galleryData = JSON.parse(localStorage.getItem('indexHair_Gallery_V9')) || [
        { id: 1, name: "フェミニンボブ", comment: "耳掛けスタイル。", tags: "#ボブ", url: "https://picsum.photos/seed/1/500/700" },
        { id: 2, name: "艶髪ロング", comment: "髪質改善カラー。", tags: "#ロング", url: "https://picsum.photos/seed/2/500/700" }
    ];

    let searchQuery = "";
    let currentPage = 1;
    const itemsPerPage = 12;

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = "";
        
        const filtered = galleryData.filter(item => 
            item.name.includes(searchQuery) || item.tags.includes(searchQuery)
        );

        const pageItems = filtered.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

        pageItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.dataset.id = item.id;
            card.innerHTML = `
                <img src="${item.url}">
                <div class="card-info">
                    <div class="style-name">${item.name}</div>
                    <div class="style-comment">${item.comment || ""}</div>
                    <div class="style-tags">${item.tags}</div>
                </div>
                <div class="admin-overlay">
                    <button class="admin-btn btn-edit" title="編集" onclick="openModal(${item.id})">✎</button>
                    <button class="admin-btn btn-delete" title="削除" onclick="deleteStyle(${item.id})">🗑</button>
                </div>
            `;
            grid.appendChild(card);
        });
        renderPagination(filtered.length);
        initSortable();
    }

    function initSortable() {
        const grid = document.getElementById('gallery-grid');
        Sortable.create(grid, {
            animation: 150,
            onEnd: function() {
                const newOrderIds = Array.from(grid.children).map(card => parseInt(card.dataset.id));
                const newGalleryData = [];
                newOrderIds.forEach(id => {
                    const item = galleryData.find(d => d.id === id);
                    if(item) newGalleryData.push(item);
                });
                galleryData.forEach(item => {
                    if(!newGalleryData.find(n => n.id === item.id)) newGalleryData.push(item);
                });
                galleryData = newGalleryData;
                localStorage.setItem('indexHair_Gallery_V9', JSON.stringify(galleryData));
            }
        });
    }

    function saveEdit() {
        const idVal = document.getElementById('edit-id').value;
        const name = document.getElementById('edit-name').value;
        const url = document.getElementById('edit-url').value;
        const comment = document.getElementById('edit-comment').value;
        const tags = document.getElementById('edit-tags').value;

        if (!name || !url) return alert("名前と画像は必須です");

        if (idVal === "new") {
            galleryData.unshift({ id: Date.now(), name, url, comment, tags });
        } else {
            const item = galleryData.find(d => d.id === parseInt(idVal));
            Object.assign(item, { name, url, comment, tags });
        }

        localStorage.setItem('indexHair_Gallery_V9', JSON.stringify(galleryData));
        closeModal();
        renderGallery();
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('edit-url').value = e.target.result;
                updatePreview();
            };
            reader.readAsDataURL(file);
        }
    }

    const dropArea = document.getElementById('drop-area');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
    });

    dropArea.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        if (dt.files && dt.files.length > 0) {
            const file = dt.files[0];
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('edit-url').value = e.target.result;
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        } else {
            let url = dt.getData('text/plain');
            if (url && url.startsWith('http')) {
                document.getElementById('edit-url').value = url;
                updatePreview();
            }
        }
    }, false);

    function updatePreview() {
        const url = document.getElementById('edit-url').value;
        const img = document.getElementById('image-preview');
        const ph = document.getElementById('preview-placeholder');
        if (url && url.trim() !== "") {
            img.src = url;
            img.style.display = 'block';
            ph.style.display = 'none';
        } else {
            img.style.display = 'none';
            ph.style.display = 'block';
        }
    }

    function openModal(id) {
        const item = galleryData.find(d => d.id === id);
        document.getElementById('modal-title').innerText = "スタイル編集";
        document.getElementById('edit-id').value = item.id;
        document.getElementById('edit-name').value = item.name;
        document.getElementById('edit-url').value = item.url;
        document.getElementById('edit-comment').value = item.comment;
        document.getElementById('edit-tags').value = item.tags;
        document.getElementById('file-input').value = "";
        document.getElementById('modal-overlay').style.display = 'flex';
        updatePreview();
    }

    function addNewStyle() {
        document.getElementById('modal-title').innerText = "新規追加";
        document.getElementById('edit-id').value = "new";
        document.getElementById('edit-name').value = "";
        document.getElementById('edit-url').value = "";
        document.getElementById('edit-comment').value = "";
        document.getElementById('edit-tags').value = "";
        document.getElementById('file-input').value = "";
        document.getElementById('modal-overlay').style.display = 'flex';
        updatePreview();
    }

    function deleteStyle(id) {
        if(confirm("このスタイルを削除してもよろしいですか？")) {
            galleryData = galleryData.filter(d => d.id !== id);
            localStorage.setItem('indexHair_Gallery_V9', JSON.stringify(galleryData));
            renderGallery();
        }
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function handleSearch() { searchQuery = document.getElementById('search-input').value; currentPage = 1; renderGallery(); }
    
    function renderPagination(total) {
        const container = document.getElementById('pagination');
        container.innerHTML = "";
        const pages = Math.ceil(total / itemsPerPage);
        if (pages <= 1) return;
        for (let i = 1; i <= pages; i++) {
            const btn = document.createElement('button');
            btn.innerText = i; btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.onclick = () => { currentPage = i; renderGallery(); };
            container.appendChild(btn);
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = `${now.toLocaleTimeString('ja-JP', {hour12:false})}`;
    }
    setInterval(updateClock, 1000);
    renderGallery();
</script>
</body>
</html>
